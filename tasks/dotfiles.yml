---
- name: Install stow
  become: true
  ansible.builtin.apt:
    name: [stow]

- name: Check if dotfiles exist
  ansible.builtin.stat:
    path: "{{ dotfiles_dir_path }}"
  register: dotfiles_stats

- name: Clone dotfiles
  ansible.builtin.git:
    repo: git@github.com:alexiszamanidis/dotfiles.git
    dest: "{{ dotfiles_dir_path }}"
    recursive: true
    update: true
    accept_hostkey: true
    key_file: "{{ dest_key }}"
    version: master
  when: not dotfiles_stats.stat.exists

- name: Remove all default files/folders that need to be stowed (~/.zshrc)
  ansible.builtin.file:
    state: absent
    path: ~/.zshrc

- name: Stow dotfiles
  ansible.builtin.shell: |
    chmod +x install stow unstow && ./install
  args:
    chdir: "{{ dotfiles_dir_path }}"
  register: dotfiles_stow_result
  changed_when: false

- name: Show dotfiles stow stdout
  ansible.builtin.debug:
    msg: "{{ dotfiles_stow_result.stdout_lines }}"
  when: dotfiles_stow_result.stdout != ''

- name: Show dotfiles stow stderr
  ansible.builtin.debug:
    msg: "{{ dotfiles_stow_result.stderr_lines }}"
  when: dotfiles_stow_result.stderr != ''

- name: Stow wsl
  ansible.builtin.shell: |
    chmod +x wsl && ./wsl
  args:
    chdir: "{{ dotfiles_dir_path }}"
  register: dotfiles_wsl_result
  changed_when: false
  when: is_wsl

- name: Show dotfiles wsl stdout
  ansible.builtin.debug:
    msg: "{{ dotfiles_wsl_result.stdout_lines }}"
  when: is_wsl and dotfiles_wsl_result.stdout != ''

- name: Show dotfiles wsl stderr
  ansible.builtin.debug:
    msg: "{{ dotfiles_wsl_result.stderr_lines }}"
  when: is_wsl and dotfiles_wsl_result.stderr != ''
