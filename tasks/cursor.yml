---
- name: Check if Cursor Agent is installed
  ansible.builtin.stat:
    path: "{{ bin_dir_path }}/agent"
  register: cursor_agent_stat

- name: Download Cursor Agent installer
  ansible.builtin.get_url:
    url: https://cursor.com/install
    dest: /tmp/cursor-install.sh
    mode: "0755"

- name: Install Cursor Agent
  ansible.builtin.command:
    cmd: /tmp/cursor-install.sh
    creates: "{{ bin_dir_path }}/agent"
  when: not cursor_agent_stat.stat.exists

- name: Update Cursor Agent to latest
  ansible.builtin.command: "{{ bin_dir_path }}/agent update"
  when: cursor_agent_stat.stat.exists
  register: cursor_agent_update
  changed_when: (cursor_agent_update.stdout | default('') | trim) != 'Checking for updates...'

- name: Check for Cursor apt repository (deb822)
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/cursor.sources
  register: cursor_apt_sources

- name: Check for Cursor apt repository (legacy list)
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/cursor.list
  register: cursor_apt_list

- name: Remove conflicting Cursor apt list when deb822 source exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/cursor.list
    state: absent
  when: not is_wsl and cursor_apt_sources.stat.exists and cursor_apt_list.stat.exists

- name: Remove legacy Cursor apt list before configuring deb822 source
  become: true
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/cursor.list
    state: absent
  when: not is_wsl and not cursor_apt_sources.stat.exists and cursor_apt_list.stat.exists

- name: Install gpg for Cursor apt repository
  become: true
  ansible.builtin.apt:
    name: gpg
  when: not is_wsl and not cursor_apt_sources.stat.exists

- name: Download Cursor apt repository key
  become: true
  ansible.builtin.get_url:
    url: https://downloads.cursor.com/keys/anysphere.asc
    dest: /tmp/cursor-anysphere.asc
    mode: "0644"
  when: not is_wsl and not cursor_apt_sources.stat.exists

- name: Dearmor Cursor apt repository key
  become: true
  ansible.builtin.command:
    cmd: gpg --dearmor -o /usr/share/keyrings/anysphere.gpg /tmp/cursor-anysphere.asc
    creates: /usr/share/keyrings/anysphere.gpg
  when: not is_wsl and not cursor_apt_sources.stat.exists

- name: Add Cursor apt repository
  become: true
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/cursor.sources
    content: |
      Types: deb
      URIs: https://downloads.cursor.com/aptrepo
      Suites: stable
      Components: main
      Architectures: amd64
      Signed-By: /usr/share/keyrings/anysphere.gpg
    mode: "0644"
  when: not is_wsl and not cursor_apt_sources.stat.exists

- name: Update Cursor apt cache
  become: true
  ansible.builtin.apt:
    update_cache: true
  changed_when: false
  when: not is_wsl

- name: Install or upgrade Cursor desktop app # noqa: package-latest
  become: true
  ansible.builtin.apt:
    name: cursor
    state: latest
    update_cache: false
  when: not is_wsl
